# This config file contains the parameters used for creating the Solr query

all:
  pf: # Fields used for boosting results
    - [title_ab, 10000]
    - [title_a, 8000]
    - [titleProper, 1500]
    - [title_topProper, 1000]
    - [title_restProper, 800]
    - [series, 100]
    - [series2, 100]
    - [author, 1600]
    - [author2, 800]
    - [author_top, 100]
    - [author_rest, 50]
    - [topicProper, 200]
    - [allfieldsProper, 100]
  qf: # Fields used to find the results
    - [allfieldsProper, 2]
    - [allfields, 1]
    - [titleProper, 50]
    - [title_topProper, 30]
    - [title_restProper, 15]
    - [title, 10]
    - [title_top, 5]
    - [title_rest, 2]
    - [series, 5]
    - [series2, 5]
    - [author, 80]
    - [author2, 50]
    - [author_top, 30]
    - [author_rest, 15]
    - [issn, 1]
    - [isbn, 1]
    - [lccn, 1]
    - [oclc, 1]
    - [sdrnum, 1]
    #- [ht_id, 1]
    - [isn_related, 1]
    - [rptnum, 1]
    - [topicProper, 2]
    - [topic, 1]
    - [era, 1]
  mm: "100%"
  tie: 0.5
  parser: "edismax"
  debug: "all"

ocronly:
  parser: "edismax"
  debug: "all"
  qf:
    - [ocr, 500000]
  mm: "100%"
  tie: 0.9

ocr:
  parser: "edismax"
  debug: "all"
  pf:
    - [title_ab, 10000]
    - [titleProper, 1500]
    - [title_topProper, 1000]
    - [title_restProper, 800]
    - [series, 100]
    - [series2, 100]
    - [author, 1600]
    - [author2, 800]
    - [topicProper, 200]
    - [allfieldsProper, 100]
  qf:
    - [ocr, 50000]
    - [allfieldsProper, 2]
    - [allfields, 1]
    - [titleProper, 50]
    - [title_topProper, 30]
    - [title_restProper, 15]
    - [title, 10]
    - [title_top, 5]
    - [title_rest, 2]
    - [series, 5]
    - [series2, 5]
    - [author, 80]
    - [author2, 50]
    - [issn, 1]
    - [isbn, 1]
    - [oclc, 1]
    - [sdrnum, 1]
    - [id, 1]
    - [rptnum, 1]
    - [topicProper, 2]
    - [topic, 1]
    - [era, 1]
  mm: "100%"
  tie: 0.9

title:
  parser: "edismax"
  debug: "all"
  pf: # Fields used for boosting results
    - [title_ab, 25000]
    - [title_a, 15000]
    - [titleProper, 1200]
    - [title_topProper, 600]
    - [title_restProper, 400]
    - [series, 300]
    - [series2, 300]
  qf: # Fields used to find the results
    - [titleProper, 120]
    - [title_topProper, 60]
    - [title_restProper, 40]
    - [series, 50]
    - [series2, 50]
    - [title, 30]
    - [title_top, 20]
    - [title_rest, 10]
  mm: "100%"
  tie: 0.1

author:
  pf: # Fields used for boosting results
    - [author, 25000]
    - [author2, 20000]
    - [author_top, 5000]
    - [author_rest, 1000]
  qf:
    - [author, 10]
    - [author2, 5]
    - [author_top, 2]
    - [author_rest, 1]
  mm: "100%"
  tie: 0.1

subject:
  pf:
    - [topicProper, 5]
    - [topic, 1]
    - [fullgeographic, 1]
    - [fullgenre, 1]
    - [era, 1]
  qf:
    - [topicProper, 5]
    - [topic, 1]
    - [fullgeographic, 1]
    - [fullgenre, 1]
    - [era, 1]
  mm: "100%"
  tie: 0.1

field_search_map:
  "Full Text & All Fields": ocr
  "Only Full Text": ocronly
  "All Fields": all
  "Title": title
  "Author": author
  "Subject": subject

field_facet_mapping:
  "language": language008_full
  "format": format
  "location": htsource
  "date_range_facet": publishDateRange
  "date_trie_facet": publishDateTrie
  "rights": rights
